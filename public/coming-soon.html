<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LetsSee | Coming Soon</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root { color-scheme: dark; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0a0f1c; color: #f8fafc; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        main { width: min(92vw, 720px); padding: 48px; border: 1px solid rgba(197, 160, 89, .34); border-radius: 28px; background: linear-gradient(145deg, rgba(15, 23, 42, .96), rgba(8, 13, 26, .98)); box-shadow: 0 30px 90px rgba(0, 0, 0, .42); text-align: center; }
        .eyebrow { color: #f5d28a; font-size: 12px; font-weight: 800; letter-spacing: .22em; text-transform: uppercase; }
        h1 { margin: 18px 0 12px; font-size: clamp(34px, 7vw, 68px); line-height: 1; }
        p { margin: 0 auto; max-width: 560px; color: #cbd5e1; font-size: 18px; line-height: 1.7; }
        .badge { display: inline-flex; margin-top: 30px; padding: 10px 16px; border-radius: 999px; background: rgba(197, 160, 89, .12); color: #f5d28a; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">Launching Soon</div>
        <h1>LetsSee</h1>
        <p>Our digital growth and platform experience is being prepared. A sharper brand presence is coming soon.</p>
        <div class="badge">Website setup in progress</div>
    </main>
</body>
</html>
